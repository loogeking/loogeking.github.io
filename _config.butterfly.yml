# ========== 导航菜单 ==========
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# ========== 代码高亮 ==========
highlight_theme: mac
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: false
code_word_wrap: false

# ========== 网站图标 favicon ==========
favicon: /img/favicon.png

# ========== 头像 ==========
avatar:
  img: /img/avatar.png
  effect: false

# ========== 站点信息（侧边栏卡片）==========
disable_total_site_data: false
site_name: 文章 || 标签 || 分类

# ========== 社交按钮 ==========
social:
  fab fa-github: https://github.com/loogeking || Github

# ========== 首页顶部 Banner ==========
index_img:
default_top_img:
archive_img:
tag_img:
tag_per_img:
category_img:
category_per_img:
link_top_img:

disable_top_img: false
default_top_img_height: 100
top_img_height: 60
index_site_info_top_img:
sidebar_bg_img:

# ========== 首页副标题（打字机效果）==========
subtitle:
  enable: true
  effect: true
  loop: true
  source: false
  sub:
    - 代码改变世界
    - 保持热爱，奔赴山海
    - Hello, World!

# ========== 文章封面 ==========
cover:
  index_enable: true
  aside_enable: true
  archives_enable: false
  position: both
  default_cover:
    - https://i.postimg.cc/0NNztsVV/default-cover.jpg

# ========== 文章元信息 ==========
post_meta:
  page:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true

# ========== 字数统计 ==========
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# ========== 站点底部信息 ==========
footer:
  owner:
    enable: true
    since: 2026
  custom_text:
  copyright:
    enable: true

# ========== 侧边栏 ==========
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 保持热爱，奔赴山海
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/loogeking
  card_announcement:
    enable: true
    content: 欢迎来到 Loogeking 的博客，这里记录着代码与生活的点滴
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# ========== 加载动画 ==========
# 修改：移动端加载动画会延迟首屏，改为关闭
# 如果你很需要这个动画，可以改回 true，但移动端体验会差一些
preloader:
  enable: false
  custom_message: 加载中...
  pace: false
  pace_css_url:

# ========== 右下角工具栏 ==========
# 修改：把 hideAside 从 hide 移到 show
# 原因：移动端用户需要通过 hideAside 按钮打开侧边栏来查看目录
# hideAside 按钮在移动端是打开侧边栏（含TOC）的唯一入口
rightside_item_order:
  enable: true
  hide: readmode,translate        # ← 去掉了 hideAside
  show: darkmode,hideAside        # ← 加到 show 里

readmode: true
translate:
  enable: false                   # 翻译功能用不到就关掉，少加载一个功能

# ========== 暗色模式 ==========
display_mode: auto
darkmode:
  enable: true
  button: true
  autoChangeMode: false
  start: 18
  end: 6

# ========== 站点统计 ==========
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# ========== 滚动百分比 ==========
rightside_scroll_percent: true

# ========== 目录 TOC ==========
# 修改：expand 改为 true，移动端打开侧边栏后目录直接展开不用再点
# style_simple 改为 true，移动端简洁模式更好用
toc:
  post: true
  page: false
  number: true
  expand: true                    # ← 改为 true，默认展开
  style_simple: true              # ← 改为 true，简洁模式，移动端更友好
  scroll_percent: true

# ========== 平滑滚动 ==========
swiper_css:
swiper_js:
sponsor:
  enable: false

# ========== PJAX 无刷新切换 ==========
pjax:
  enable: true
  exclude:

# ========== 阅读进度条 ==========
reading_progress:
  enable: true
  start_color: "#4a90e2"
  end_color: "#7eb8ff"
  height_progress: "2px"
  position: top

# ========== 自定义 CSS / JS 注入 ==========
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    - <script src="/js/custom.js"></script>
    - <script src="/js/auto-dark-post.js"></script>
    - <script defer src="//busuanzi.9420.ac/busuanzi.pure.mini.js"></script>