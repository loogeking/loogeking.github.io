# Site
title: Loogeking's Blog
subtitle: '代码改变世界'
description: '个人技术博客'
keywords: 博客,技术,前端
author: Loogeking
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://loogeking.github.io
permalink: posts/:title/

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''

# Home page setting
index_generator:
  path: ''
  per_page: 8
  order_by: -date



# Pagination
per_page: 8

# Extensions
theme: butterfly

# Math
math:
  # 选择 mathjax 或 katex
  use: mathjax
  per_page: true  # true 时只在 mathjax: true 的文章渲染；false 全局
  hide_scrollbar: false

mathjax:
  enable: true
  per_page: true  

markdown:
  plugins:
    - markdown-it-mathjax3

# 归档页面设置 (Archive)
archive_generator:
  per_page: 0
  yearly: true
  monthly: true 
# 分类页面设置 (Category)
category_generator:
  per_page: 0

# 标签页面设置 (Tag)
tag_generator:
  per_page: 0