# ========== 导航菜单 ==========
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# ========== 代码高亮 ==========
highlight_theme: mac
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: false
code_word_wrap: false

# ========== 网站图标 favicon ==========
favicon: /img/favicon.png

# ========== 头像 ==========
avatar:
  img: /img/avatar.png
  effect: false  # 头像旋转效果，先关掉

# ========== 站点信息（侧边栏卡片）==========
disable_total_site_data: false
site_name: 文章 || 标签 || 分类

# ========== 社交按钮 ==========
social:
  fab fa-github: https://github.com/loogeking || Github

# ========== 首页顶部 Banner ==========
index_img: /img/articles/Python学习笔记.mp4           # 首页 Banner
default_top_img:       # 默认顶部图（文章页）
archive_img: 
tag_img: 
tag_per_img:
category_img: 
category_per_img:
link_top_img: 

# 首页 Banner 文字（打字机效果）
disable_top_img: false
default_top_img_height: 100      # 首页 Banner 100vh 全屏
top_img_height: 60               # 其他页面 60vh
index_site_info_top_img:         # 站点信息卡片背景
sidebar_bg_img:

# ========== 首页副标题（打字机效果）==========
subtitle:
  enable: true
  effect: true                   # 打字机效果
  loop: true                     # 循环
  source: false                  # 不从一言获取
  sub:
    - 代码改变世界
    - 保持热爱，奔赴山海
    - Hello, World!

# ========== 文章封面 ==========
cover:
  index_enable: true             # 首页文章卡片显示封面
  aside_enable: true             # 侧边栏最新文章显示封面
  archives_enable: false         # 归档页不显示
  position: both                 # 封面位置：左/右交替
  default_cover:
    - /img/articles/default-cover.png     # 没有封面时的默认图

# ========== 文章元信息 ==========
post_meta:
  page:
    date_type: both              # 显示发表+更新时间
    date_format: relative        # 相对时间（1天前）
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true

# ========== 字数统计 ==========
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# ========== 站点底部信息 ==========
footer:
  owner:
    enable: true
    since: 2026
  custom_text:
  copyright:
    enable: true

# ========== 侧边栏 ==========
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right                # 右侧
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 保持热爱，奔赴山海
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/loogeking
  card_announcement:
    enable: true
    content: 欢迎来到 Loogeking 的博客，这里记录着代码与生活的点滴
  card_recent_post:
    enable: true
    limit: 5
    sort: date                   # 按日期排序
    sort_order:                  # desc 倒序
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# ========== 加载动画 ==========
preloader:
  enable: true
  custom_message: 加载中...
  pace: false                    # 顶部进度条
  pace_css_url:

# ========== 看板娘 ==========
# 用 Live2D（动态）：需要装 hexo-helper-live2d 插件，先用静态图代替
# 静态看板娘：直接放在 source/img/ 里，用自定义 JS 注入
# 先在这里关闭，后面用自定义方式实现
# 如果想用 Butterfly 内置的 fukidashi（对话气泡），可在这里开

# ========== 右下角工具栏 ==========
rightside_item_order:
  enable: true
  hide: readmode,translate,hideAside
  show: darkmode
readmode: true                   # 阅读模式
translate:
  enable: false                  # 翻译（先关）

# ========== 暗色模式 ==========
display_mode: auto               # light / dark / auto
darkmode:
  enable: true
  button: true                   # 显示切换按钮
  autoChangeMode: false          # 不自动切换
  start: 18                      # 18 点入夜
  end: 6                         # 6 点天亮

# ========== 站点统计 ==========
busuanzi:
  site_uv: true                  # 站点访客
  site_pv: true                  # 站点浏览
  page_pv: true                  # 文章浏览

# ========== 滚动百分比 ==========
rightside_scroll_percent: true

# ========== 平滑滚动 ==========
swiper_css:
swiper_js:
sponsor:
  enable: false

# ========== PJAX 无刷新切换（重要！配合动画过渡）==========
pjax:
  enable: true
  exclude:

# ========== 阅读进度条 ==========
reading_progress:
  enable: true
  start_color: "#4a90e2"
  end_color: "#7eb8ff"
  height_progress: "2px"
  position: top                  # top / bottom

# ========== 自定义 CSS / JS 注入 ==========
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
    - - <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  bottom:
    - <script src="/js/custom.js"></script>